name: Run Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Benchmark/Benchmark.csproj
      - name: Build
        run: dotnet build Benchmark/Benchmark.csproj --configuration Release
      - name: Run Benchmarks
        run: dotnet run --project Benchmark/Benchmark.csproj --configuration Release
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}
          path: BenchmarkResults
          path: |
            BenchmarkResults/
            **/BenchmarkDotNet.Artifacts/